# ============================================================
# YigeWorks CI/CD Pipeline
# 触发条件: main 分支 push / PR
# 流程: Test → Build Docker → Deploy to Lighthouse
# ============================================================
name: YigeWorks Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # 手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================
  # 1. Django 测试
  # =============================================
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: yigeworks_test
          POSTGRES_USER: yigeworks
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Migrations
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: "ci-test-secret-key"
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          CSRF_TRUSTED_ORIGINS: "http://localhost"
          SECURE_SSL_REDIRECT: "False"
          POSTGRES_DB: yigeworks_test
          POSTGRES_USER: yigeworks
          POSTGRES_PASSWORD: testpass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py migrate --noinput

      - name: Run Tests
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: "ci-test-secret-key"
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          CSRF_TRUSTED_ORIGINS: "http://localhost"
          SECURE_SSL_REDIRECT: "False"
          POSTGRES_DB: yigeworks_test
          POSTGRES_USER: yigeworks
          POSTGRES_PASSWORD: testpass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py test apps/ --verbosity=2

      - name: Collect Static
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: "ci-test-secret-key"
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: "localhost"
          CSRF_TRUSTED_ORIGINS: "http://localhost"
          SECURE_SSL_REDIRECT: "False"
          POSTGRES_DB: yigeworks_test
          POSTGRES_USER: yigeworks
          POSTGRES_PASSWORD: testpass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py collectstatic --noinput --verbosity=0

  # =============================================
  # 2. 部署到腾讯云 Lighthouse
  # =============================================
  deploy:
    name: Deploy to Lighthouse
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH Deploy to Lighthouse
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LIGHTHOUSE_HOST }}
          username: ${{ secrets.LIGHTHOUSE_USER }}
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          port: ${{ secrets.LIGHTHOUSE_PORT || 22 }}
          script: |
            cd /var/www/yigeworks

            # 拉取最新代码
            git pull origin main

            # 迁移数据库
            docker compose exec -T web python manage.py migrate --noinput

            # 收集静态文件
            docker compose exec -T web python manage.py collectstatic --noinput

            # 重启服务
            docker compose restart web celery-worker celery-beat

            # 健康检查
            sleep 5
            curl -f http://localhost:8000/ || echo "Health check warning"

            echo "✅ Deploy completed: $(date -u)"
